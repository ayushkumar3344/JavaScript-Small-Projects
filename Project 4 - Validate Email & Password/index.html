<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Validate Eamil & Password </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    


    <div class="container">

        <header>Sign Up</header>

        <form action="https://www.apple.com/">

            <div class="field email-field">
                <div class="input-field">
                    <input type="email" placeholder="Enter Your Email" class="email">
                </div>
                <span class="error email-error">
                    <i class="fa-solid fa-circle-exclamation error-icon"></i>
                    <p class="error-text">Please Enter a Valid Email</p>
                </span>
            </div>   

            <div class="field create-password">
                <div class="input-field target">
                    <input type="password" placeholder="Create Password" class="password">
                    <i class="fa-regular fa-eye-slash show-hide"></i>
                </div>
                <span class="error password-error">
                    <i class="fa-solid fa-circle-exclamation error-icon"></i>
                    <p class="error-text">Please enter atleast 8 character with number , symbol ,small and capital letter.</p>
                </span>
            </div>

            <div class="field confirm-password">
                <div class="input-field target">
                    <input type="password" placeholder="Confirm Password" class="cpassword">
                    <i class="fa-regular fa-eye-slash show-hide"></i>
                </div>
                <span class="error password-error">
                    <i class="fa-solid fa-circle-exclamation error-icon"></i>
                    <p class="error-text">Password don't match</p>
                </span>
            </div>

            <div class="input-field button">
                <input type="submit" value="Submit Now">
            </div>

        </form>

    </div>



























    



    <!-- Link JavaScript File -->
     <script src="script.js"></script>
    <!--  -->

</body>
</html>
